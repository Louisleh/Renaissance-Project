name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: renaissance-app

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npx tsc -b

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm test

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Baseline has 13 pre-existing ESLint errors in components we haven't touched.
    # Kept non-blocking for now; flip to required once the baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm run lint

  e2e:
    name: E2E + a11y (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run build
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: renaissance-app/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Lighthouse numbers are noisy from shared runners; keep advisory until
    # we have a few green baseline runs to calibrate the thresholds.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:perf
      - name: Upload Lighthouse report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: renaissance-app/.lighthouseci
          retention-days: 7

  db-policies:
    name: Database RLS (pgTAP)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations)
        run: supabase start
        working-directory: renaissance-app
      - name: Run pgTAP RLS specs
        run: supabase test db
        working-directory: renaissance-app
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: renaissance-app
