name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: renaissance-app

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npx tsc -b

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm test

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Baseline has 13 pre-existing ESLint errors in components we haven't touched.
    # Kept non-blocking for now; flip to required once the baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: renaissance-app/package-lock.json
      - run: npm ci
      - run: npm run lint
